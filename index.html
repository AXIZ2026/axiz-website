<script>
const img = document.getElementById('fullImage');

function goTo(percent){
    window.scrollTo({
        top: img.offsetHeight * (percent / 100),
        behavior: 'smooth'
    });
}

function goToTop(){
    window.scrollTo({
        top: 0,
        behavior: 'smooth'
    });
}
</script>
