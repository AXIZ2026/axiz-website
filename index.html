<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXIZ – Consultora Legal Estratégica</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --azul:   #4A6D7C;
    --dorado: #C9A84C;
    --blanco: #FFFFFF;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { font-family:'Raleway',sans-serif; background:var(--blanco); overflow-x:hidden; }

  /* ── STICKY NAV ── */
  #sticky-nav {
    position:fixed; top:0; left:0; right:0; z-index:200;
    background:rgba(255,255,255,0.97); backdrop-filter:blur(6px);
    border-bottom:1px solid #e5e0d8;
    padding:10px 5vw; display:flex; align-items:center; justify-content:space-between;
    transform:translateY(-100%); transition:transform .35s ease;
  }
  #sticky-nav.visible { transform:translateY(0); }
  #sticky-nav img { height:26px; }
  .snav { display:flex; gap:6px; flex-wrap:wrap; }
  .snav a {
    font-size:11px; font-weight:500; letter-spacing:0.16em; text-transform:uppercase;
    text-decoration:none; color:var(--blanco); background:var(--azul);
    padding:7px 14px; border-radius:6px;
    transition:background .2s, opacity .2s;
  }
  .snav a:hover { opacity:0.82; }

  /* ── HERO ── */
  #inicio {
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    background:var(--blanco); padding:60px 20px 50px;
  }
  #inicio img.logo { width:clamp(220px,40vw,480px); margin-bottom:52px; }

  /* Hero nav buttons — match screenshots exactly */
  .hnav { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
  .hnav a {
    font-family:'Raleway',sans-serif;
    font-size:clamp(10px,1vw,12px); font-weight:500;
    letter-spacing:0.18em; text-transform:uppercase;
    text-decoration:none;
    color:var(--blanco);
    background:var(--azul);
    padding:12px 24px;
    border-radius:8px;
    transition:opacity .2s, transform .2s;
  }
  .hnav a:hover { opacity:0.82; transform:translateY(-2px); }

  /* ── SECTIONS ── */
  .pag {
    min-height:100vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:70px 4vw; background:var(--blanco);
    border-top:1px solid #eae6e0;
  }
  .pag img {
    width:100%; max-width:960px; height:auto;
    display:block; border:none; outline:none;
  }

  /* ── CONTACTO ── */
  #contacto {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    border-top:1px solid #eae6e0;
  }
  .ct-wrap { text-align:center; padding:60px 6vw; max-width:700px; margin:0 auto; }
  .stitle {
    font-weight:200; font-size:clamp(20px,2.6vw,34px);
    letter-spacing:0.28em; text-transform:uppercase;
    color:var(--dorado); margin-bottom:40px;
  }
  .ct-emails { display:flex; justify-content:space-around; flex-wrap:wrap; gap:16px; }
  .ct-emails a {
    font-size:clamp(13px,1.2vw,16px); font-weight:300;
    color:var(--azul); text-decoration:none; transition:color .2s;
  }
  .ct-emails a:hover { color:var(--dorado); }

  /* ── FOOTER ── */
  footer {
    background:var(--azul); color:rgba(255,255,255,0.5);
    text-align:center; padding:22px 20px;
    font-size:10px; letter-spacing:0.16em; text-transform:uppercase;
  }
  footer b { color:var(--dorado); font-weight:400; }

  /* ── BACK TO TOP ── */
  #btt {
    position:fixed; bottom:26px; right:26px; width:42px; height:42px;
    background:var(--azul); color:var(--blanco); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:17px; text-decoration:none; z-index:50;
    opacity:0; pointer-events:none; transition:opacity .3s,background .2s;
  }
  #btt.on { opacity:1; pointer-events:auto; }
  #btt:hover { background:var(--dorado); }

  .fi { opacity:0; transform:translateY(16px); transition:opacity .65s ease,transform .65s ease; }
  .fi.on { opacity:1; transform:translateY(0); }

  @media(max-width:600px) { .snav { display:none; } }
</style>
</head>
